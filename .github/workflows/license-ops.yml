name: License Ops

on:
  repository_dispatch:
    types:
      - publish-seed
      - publish-audit
      - robot-telemetry
      - ping

concurrency:
  group: license-ops
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Apply payload
        env:
          EVENT_TYPE: ${{ github.event.action }}
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
          OPS_API_OPERATOR_KEY: ${{ secrets.OPS_API_OPERATOR_KEY }}
          OPS_API_ROBOT_KEY: ${{ secrets.OPS_API_ROBOT_KEY }}
        run: node .github/scripts/license-ops.mjs

      - name: Commit and push
        if: github.event.action != 'ping'
        env:
          COMMIT_MESSAGE: ${{ github.event.client_payload.message || format('license-ops: {0}', github.event.action) }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/
          if git diff --staged --quiet; then
            echo "No file changes."
            exit 0
          fi
          git commit -m "$COMMIT_MESSAGE"
          for attempt in 1 2 3 4 5 6 7 8; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            sleep $((attempt * 2))
          done
          echo "Push failed after retries."
          exit 1
