name: Panel UiPath Patch Tests

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/panel-tests.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/**'
      - 'package.json'
      - '.github/workflows/panel-tests.yml'
  workflow_dispatch:

jobs:
  uipath-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install test dependencies
        run: npm install

      - name: UiPath patch unit tests
        run: npm run test:uipath

      - name: UiPath patch E2E tests
        run: npm run test:uipath:e2e
